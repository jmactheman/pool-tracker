<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pool Tracker</title>
  <meta name="theme-color" content="#0e7490">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg: #0b1220; --card: #131c2e; --text: #e6edf6; --muted: #8b98ab;
      --accent: #0e7490; --accent-hi: #22d3ee;
      --ok: #16a34a; --bad: #dc2626;
      --radius: 14px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; padding: 12px 12px calc(96px + env(safe-area-inset-bottom));
      background: var(--bg); color: var(--text);
      font: 17px/1.35 -apple-system, system-ui, sans-serif;
      max-width: 480px; margin-inline: auto;
    }
    header { display: flex; align-items: center; justify-content: space-between; padding: 4px 2px 10px; }
    h1 { font-size: 20px; margin: 0; }
    #pending {
      background: var(--bad); color: #fff; font-size: 13px; font-weight: 600;
      padding: 4px 10px; border-radius: 999px;
    }
    .chip {
      display: block; text-align: center; padding: 12px; margin-bottom: 12px;
      border-radius: var(--radius); background: var(--card); color: var(--muted);
      font-weight: 600;
    }
    .chip.ok  { background: var(--ok);  color: #fff; }
    .chip.bad { background: var(--bad); color: #fff; }
    .field {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border-radius: var(--radius);
      padding: 8px 10px; margin-bottom: 8px;
    }
    .field label { font-weight: 700; min-width: 72px; }
    .field .unit { color: var(--muted); font-size: 12px; font-weight: 400; margin-left: 5px; }
    .stepper { display: flex; align-items: center; gap: 6px; }
    .step-btn {
      width: 56px; height: 52px; font-size: 28px; border: 0; border-radius: 12px;
      background: #1e2a42; color: var(--accent-hi); font-weight: 700;
    }
    .step-btn:active { background: var(--accent); color: #fff; }
    .stepper input {
      width: 84px; height: 52px; text-align: center; font-size: 22px; font-weight: 700;
      border: 0; border-radius: 12px; background: #0f1728; color: var(--text);
    }
    .stepper input::placeholder { color: #3d4a61; }
    #f-note {
      width: 100%; min-height: 56px; border: 0; border-radius: var(--radius);
      background: var(--card); color: var(--text); padding: 12px; font: inherit;
      resize: vertical; margin-bottom: 8px;
    }
    #submit {
      position: fixed; left: 12px; right: 12px; bottom: calc(12px + env(safe-area-inset-bottom));
      max-width: 456px; margin-inline: auto;
      height: 64px; font-size: 20px; font-weight: 800; border: 0;
      border-radius: var(--radius); background: var(--accent); color: #fff;
    }
    #submit:active { background: var(--accent-hi); color: #04222b; }
    #submit:disabled { opacity: .5; }
    #toast {
      position: fixed; left: 50%; bottom: calc(90px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      background: #000c; color: #fff; padding: 10px 18px; border-radius: 999px;
      font-weight: 600; opacity: 0; pointer-events: none; transition: .25s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <h1>Pool Tracker</h1>
    <span id="pending" hidden></span>
  </header>

  <div id="chip" class="chip">Loading pool config…</div>

  <div id="fields"></div>
  <textarea id="f-note" placeholder="Note (optional)"></textarea>

  <button id="submit" type="button">Save reading</button>
  <div id="toast"></div>

  <script src="./config.js"></script>
  <script src="./db.js"></script>
  <script src="./sync.js"></script>
  <script src="./app.js"></script>
</body>
</html>
